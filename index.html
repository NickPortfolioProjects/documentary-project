<!DOCTYPE html>
<html lang="en" class="cinematic-dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Meta Descriptions & Keywords-->
    <meta name="description"
        content="D-Cine is the place for all of your favorite film-makers professional and amateur">
    <meta name="keywords" content="documentaries, d-cine, documentary, d-cinema,">
    <!--CSS Bootstrap URL-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>D-Cine | Home</title>
    <!--Custom CSS Developed locally-->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <!--Navigation Bootstrap Code - Customised-->
    <nav id="navbar" class="navbar navbar-expand-lg fixed-top" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html"><img src="assets/images/d-cine-logo-v1.svg" alt="d-cine logo"
                    width="90px" height="56px"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar"
                aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar"
                aria-labelledby="offcanvasNavbarLabel">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title" id="offcanvasNavbarLabel"><img src="assets/images/d-cine-logo-v1.svg"
                            alt="d-cine logo" width="90px" height="56px"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                        <li class="nav-item">
                            <a class="nav-link active mx-lg-2" aria-current="page" href="index.html"><i
                                    class="fa-solid fa-house"></i> home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link mx-lg-2" href="about.html"><i class="fa-solid fa-user"></i> about</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link mx-lg-2" href="contact.html"><i class="fa-regular fa-envelope"></i>
                                contact</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="login.html"><i class="fa-solid fa-arrow-right-to-bracket"></i>
                                login</a>
                        </li>
                    </ul>
                    <!--<form class="d-flex mt-3" role="search">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>-->
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Search bar-->
    <div class="container-fluid my-4">
        <div class="row">
            <div class="col-md-6">
                <input id="genreSearchInput" type="text" class="form-control"
                    placeholder="Search genres, micro-genres, documentary modes...">
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-6">
                <ul id="genreSearchResults" class="list-group"></ul>
            </div>
        </div>
    </div>


    <!--Header, view of newly released titles. -->

    <div class="container-fluid">
        <div class="row">

            <!-- LEFT SIDE: New Releases -->
            <div class="col-md-6">
                <header class="header">
                    <h2 id="h2">New Releases</h2>

                    <div class="documentary-images">
                        <button class="btn btn-secondary" data-bs-toggle="popover" data-bs-placement="top"
                            data-bs-html="true" data-bs-content="Crystal Lake Memories <br> Review">
                            <img class="img-fluid documentary-img"
                                src="assets/images/documentary-images/Crystal_Lake_Memories.jpg"
                                alt="Crystal Lake Memories">
                        </button>

                        <!-- Repeat buttons -->
                    </div>
                </header>
            </div>

            <!-- RIGHT SIDE: Carousel -->
            <div class="col-md-6">
                <div id="carouselExampleAutoplaying" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="assets/images/peter-stumpf-yk9VXp4W5-Q-unsplash.jpg" class="d-block w-100"
                                alt="Editor screen">
                        </div>
                        <div class="carousel-item">
                            <img src="assets/images/jakob-owens-ntqaFfrDdEA-unsplash.jpg" class="d-block w-100"
                                alt="Setting the stage">
                        </div>
                        <div class="carousel-item">
                            <img src="assets/images/oleg-brovchenko-mVv8igQaWoI-unsplash.jpg" class="d-block w-100"
                                alt="Clapper">
                        </div>
                    </div>

                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleAutoplaying"
                        data-bs-slide="prev" aria-label="Previous slide">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    </button>

                    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleAutoplaying"
                        data-bs-slide="next" aria-label="Next slide">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    </button>

                </div>
            </div>

        </div>
    </div>







    <!--JS Bootstrap Link-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!--Font Awesome-->
    <script src="https://kit.fontawesome.com/01fd18e914.js" crossorigin="anonymous"></script>

    <!-- Popover Script -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const popoverTriggerList = document.querySelectorAll('[data-bs-toggle="popover"]');
            [...popoverTriggerList].map(el => new bootstrap.Popover(el));
        });
    </script>
    <!-- JS search JSON file -->
    <script src="assets/js/app.js"></script>
</body>

</html>
